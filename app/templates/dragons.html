<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>HatchDragonsDB</title>
    <link rel="stylesheet" href="static/style.css">
  </head>
  <h1>
    HatchDragonsDB
  </h1>
  <h3>
    Select your summon items to see the possible dragons.
  </h3>
  <body>
    <label for="set-filter">Set:</label>
    <select name="set" id="set-filter">
        <option value="">None</option>
        <option value="Woodland">Woodland</option>
        <option value="Forest Lake">Forest Lake</option>
        <option value="Alpine">Alpine</option>
        <option value="Cave">Cave</option>
        <option value="Whiskers">Whiskers</option>
        <option value="Tropical">Tropical</option>
        <option value="Mighty">Mighty</option>
        <option value="Extravagant">Extravagant</option>
    </select>
    <label for="rarity-filter">Rarity:</label>
    <select id="rarity-filter">
        <option value="">None</option>
        <option value="Common">Common</option>
        <option value="Uncommon">Uncommon</option>
        <option value="Rare">Rare</option>
        <option value="Epic">Epic</option>
        <option value="Legendary">Legendary</option>
    </select>
    <label for="essence-filter">Essence:</label>
    <select id="essence-filter">
        <option value="">None</option>
        <option value="Earth">Earth</option>
        <option value="Wind">Wind</option>
        <option value="Water">Water</option>
    </select>
  </body>
</html>
<div id="results">
    <!-- filled by JS -->
</div>
<script>
    let allDragons = [];  // stored here, in memory

    // fetch once on page load
    fetch("/dragons")
        .then(r => r.json())
        .then(data => {
            allDragons = data;
            renderTable(allDragons);
        });

    // refilter whenever a dropdown changes
    document.getElementById("set-filter").addEventListener("change", applyFilters)
    document.getElementById("rarity-filter").addEventListener("change", applyFilters);
    document.getElementById("essence-filter").addEventListener("change", applyFilters);

    function applyFilters() {
        const set     = document.getElementById("set-filter").value;
        const rarity  = document.getElementById("rarity-filter").value;
        const essence = document.getElementById("essence-filter").value;

        const filtered = allDragons.filter(d => {
            return (set     === "" || d.set     === set)
                && (rarity  === "" || d.rarity  === rarity)
                && (essence === "" || d.essence === essence);
        });

        renderTable(filtered);
    }

    function renderTable(dragons) {
        const table = document.getElementById("results");
        table.innerHTML = dragons.map(d =>
            `
            <div style="display:flex; align-items:center; gap:8px;">
                <img src="/static/dragons/${d.name}.jpg" width=64 height=64>
                <div>
                    <h4>${d.name}</h4>
                    <p>${d.set}</p>
                </div>
                <div>
                    <p>${d.rarity}</p>
                    <p>${d.essence}</p>
                </div>
            </div>
            `
        ).join("");
    }
</script>
